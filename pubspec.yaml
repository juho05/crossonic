name: crossonic
description: "A cross-platform OpenSubsonic compatible music player."
publish_to: 'none'
version: 0.1.0+7

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  inno_bundle: ^0.9.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.5.4
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
inno_bundle:
  id: cbe0f7d0-37fc-11f0-a197-6529278abc9e
  name: Crossonic
  description: OpenSubsonic compatible music player
  publisher: Julian Hofmann
  url: "https://crossonic.org/app"
  updates_url: "https://github.com/juho05/crossonic/releases/latest"
  admin: auto
  vc_redist: true
  languages:
    - english