name: Release Draft

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.6"
  APK_BUILD_DIR: "/tmp/build"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(sed -n 's/^version: \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' pubspec.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  draft_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Draft release
        id: draft_release
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}

  build_android:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Copy files to env.APK_BUILD_DIR
        run: |
          mkdir -p $APK_BUILD_DIR
          cp -r . $APK_BUILD_DIR

      - name: Decode key.properties file
        working-directory: ${{ env.APK_BUILD_DIR }}
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: echo $ENCODED_STRING | base64 -di > android/key.properties

      - name: Decode crossonic.jks file
        working-directory: ${{ env.APK_BUILD_DIR }}
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_STORE }}
        run: mkdir android/app/secrets && echo $ENCODED_STRING | base64 -di > android/app/secrets/crossonic.jks

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Dependencies
        working-directory: ${{ env.APK_BUILD_DIR }}
        run: flutter pub get

      - name: Build generated files
        working-directory: ${{ env.APK_BUILD_DIR }}
        run: flutter pub run build_runner build

      - name: Build APK
        working-directory: ${{ env.APK_BUILD_DIR }}
        run: flutter build apk --split-per-abi

      - name: Prepare AndroidManifest.xml for Play Store
        working-directory: ${{ env.APK_BUILD_DIR }}
        run: |
          sed -i '/REQUEST_INSTALL_PACKAGES/d' ./android/app/src/main/AndroidManifest.xml
          sed -i '/REQUEST_IGNORE_BATTERY_OPTIMIZATIONS/d' ./android/app/src/main/AndroidManifest.xml

      - name: Build App Bundle
        working-directory: ${{ env.APK_BUILD_DIR }}
        run: flutter build appbundle --dart-define=VERSION_CHECK=false --dart-define=PLAYSTORE=true

      - name: Upload App Bundle
        uses: actions/upload-artifact@v7
        with:
          name: android-aab-result
          path: |
            ${{ env.APK_BUILD_DIR }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-result
          path: |
            ${{ env.APK_BUILD_DIR }}/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            ${{ env.APK_BUILD_DIR }}/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            ${{ env.APK_BUILD_DIR }}/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 2
  build_linux_x86_64_AppImage:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get remove libunwind-*
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libmpv-dev libmpv1 libayatana-appindicator3-dev
          sudo apt-get install -y binutils coreutils desktop-file-utils fakeroot fuse libgdk-pixbuf2.0-dev patchelf python3-pip python3-setuptools squashfs-tools strace util-linux zsync

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        run: flutter pub get
      - name: Build generated files
        run: flutter pub run build_runner build
      - name: Compile linux
        run: flutter build linux

      # AppImage
      - name: Copy compiled linux files
        run: |
          mkdir AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/

      - name: Copy logo to AppDir
        run: |
          mkdir -p AppDir/usr/share/icons/hicolor/32x32/apps
          cp assets/icon/desktop/crossonic-32.png AppDir/usr/share/icons/hicolor/32x32/apps/crossonic.png
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
          cp assets/icon/desktop/crossonic-128.png AppDir/usr/share/icons/hicolor/128x128/apps/crossonic.png
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp assets/icon/desktop/crossonic-256.png AppDir/usr/share/icons/hicolor/256x256/apps/crossonic.png

      - name: Copy recipe to correct location
        run: cp scripts/appimage/AppImageBuilder_x86_64.yml AppImageBuilder.yml

      - name: Set version in recipe
        run: |
          sed -i 's|version: latest|version: ${{ needs.build.outputs.version }}|g' AppImageBuilder.yml

      - name: Build AppImage
        run: |
          wget -O appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          wget -O appimage-builder.AppImage https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.1.0/appimage-builder-1.1.0-x86_64.AppImage
          chmod +x appimage-builder.AppImage
          ./appimage-builder.AppImage --appimage-extract
          sed -i 's|"https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-%s"|"https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-%s"|g' squashfs-root/usr/lib/python3.8/site-packages/appimagebuilder/modules/appimage.py
          sed -i 's|"https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-%s"|"https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-%s"|g' squashfs-root/usr/lib/python3.8/site-packages/appimagebuilder/modules/prime/appimage_primer.py
          sed -i 's|"xz"|"zstd"|g' squashfs-root/usr/lib/python3.8/site-packages/appimagebuilder/modules/prime/appimage_primer.py
          ./appimagetool.AppImage squashfs-root appimage-builder.AppImage
          ./appimage-builder.AppImage --recipe=./AppImageBuilder.yml
          rm appimagetool.AppImage
          rm appimage-builder.AppImage

      - name: Upload AppImage file
        uses: actions/upload-artifact@v7
        with:
          name: appimage-x86-64-result
          path: ./*.AppImage
          retention-days: 2
      - name: Upload AppImage.zsync file
        uses: actions/upload-artifact@v7
        with:
          name: appimage-zsync-x86-64-result
          path: ./*.AppImage.zsync
          retention-days: 2
  build_linux_x86_64_TGZ:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get remove libunwind-*
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libmpv-dev libmpv2 libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        run: flutter pub get
      - name: Build generated files
        run: flutter pub run build_runner build
      - name: Compile linux
        run: flutter build linux

      # tar.gz
      - name: Create tar.gz archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../../result.tar.gz *

      - name: Upload tar.gz archive
        uses: actions/upload-artifact@v7
        with:
          name: tar-gz-x86-64-result
          path: ./*.tar.gz
          retention-days: 2

  build_windows_x86_64:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Fix long file paths
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        run: flutter pub get
      - name: Build generated files
        run: flutter pub run build_runner build
      - name: Compile for Windows
        run: flutter build windows

      - name: Build iss script
        run: dart run inno_bundle:build --no-app --release --no-installer

      - name: Output config into github output
        id: envs
        run: echo $(dart run inno_bundle:build --envs --no-hf) | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: ./build/windows/x64/installer/Release/inno-script.iss
          options: /Fcrossonic-installer

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer-x86-64-result
          path: ./build/windows/x64/installer/Release/crossonic-installer.exe
          retention-days: 2

      - name: Add DLL files
        run: |
          Copy-Item scripts/windows/x64/msvcp140.dll build/windows/x64/runner/Release/
          Copy-Item scripts/windows/x64/vcruntime140.dll build/windows/x64/runner/Release/
          Copy-Item scripts/windows/x64/vcruntime140_1.dll build/windows/x64/runner/Release/

      - name: Zip compiled files
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath Crossonic.zip

      - name: Upload zip
        uses: actions/upload-artifact@v7
        with:
          name: windows-zip-x86-64-result
          path: Crossonic.zip
          retention-days: 2
  build_macos_dmg:
    needs: build
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        run: flutter pub get
      - name: Build generated files
        run: flutter pub run build_runner build
      - name: Compile for macOS
        run: flutter build macos

      - name: Codesign app bundle
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/Crossonic.app"
          
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain 
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          
          # Function to recursively sign all binaries
          sign_binaries() {
            local path=$1
          
            # Sign all .dylib files
            find "$path" -name "*.dylib" -type f | while read dylib; do
              echo "Signing dylib: $dylib"
              codesign --force --timestamp \
                --options=runtime \
                --entitlements ./macos/Runner/Release.entitlements \
                --sign "$MACOS_CERTIFICATE_NAME" \
                "$dylib"
            done
          
            # Sign all .so files (if any)
            find "$path" -name "*.so" -type f | while read so_file; do
              echo "Signing .so: $so_file"
              codesign --force --timestamp \
                --options=runtime \
                --entitlements ./macos/Runner/Release.entitlements \
                --sign "$MACOS_CERTIFICATE_NAME" \
                "$so_file"
            done
          }
          
          # Sign frameworks first (innermost first)
          echo "Signing frameworks..."
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d | while read framework; do
            echo "Signing framework: $framework"
          
            # Sign binaries inside framework
            sign_binaries "$framework"
          
            # Sign the framework itself
            codesign --force --timestamp \
              --options=runtime \
              --entitlements ./macos/Runner/Release.entitlements \
              --sign "$MACOS_CERTIFICATE_NAME" \
              "$framework"
          done
          
          # Sign all binaries in the main app
          sign_binaries "$APP_PATH"
          
          # Finally, sign the main app bundle (last)
          echo "Signing main app bundle..."
          codesign --force --timestamp \
            --options=runtime \
            --entitlements ./macos/Runner/Release.entitlements \
            --sign "$MACOS_CERTIFICATE_NAME" \
            "$APP_PATH"
          
          # Verify signature
          echo "Verifying signature..."
          codesign --verify --verbose "$APP_PATH"

      - name: "Notarize app bundle"
        working-directory: build/macos/Build/Products/Release
        env:
          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.APPLE_ID_PWD }}
        run: |
          echo "Create keychain profile"
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" --password "$PROD_MACOS_NOTARIZATION_PWD"
          
          echo "Creating temp notarization archive"
          ditto -c -k --keepParent Crossonic.app "notarization.zip"

          echo "Notarize app"
          xcrun notarytool submit "notarization.zip" --keychain-profile "notarytool-profile" --wait

          echo "Attach staple"
          xcrun stapler staple Crossonic.app

      - name: Create .dmg file
        run: |
          npm install -g appdmg
          cd scripts/dmg
          appdmg config.json ../../Crossonic.dmg

      - name: Upload .dmg file
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg-result
          path: Crossonic.dmg
          retention-days: 2
  build_ios_ipa:
    needs: build
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Apple certification and provisioning profile
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PWD: ${{ secrets.IOS_CERTIFICATE_PWD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_CI_KEYCHAIN_PWD: ${{ secrets.IOS_CI_KEYCHAIN_PWD }}
        run: |
          # import certificate and provisioning profile from secrets
          echo -n "$IOS_CERTIFICATE" | base64 --decode > build_certificate.p12
          echo -n "$IOS_PROVISIONING_PROFILE" | base64 --decode > ./build_pp.mobileprovision
          # create temporary keychain
          security create-keychain -p "$IOS_CI_KEYCHAIN_PWD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$IOS_CI_KEYCHAIN_PWD" build.keychain
          # import certificate to keychain
          security import build_certificate.p12 -P "$IOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_CI_KEYCHAIN_PWD" build.keychain
          security list-keychain -d user -s build.keychain
          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        run: flutter pub get
      - name: Build generated files
        run: flutter pub run build_runner build
      - name: Compile for iOS
        run: flutter build ipa --dart-define=VERSION_CHECK=false --export-options-plist=./ios/Runner/ExportOptions.plist
      - name: Move .ipa to working directory
        run: mv build/ios/ipa/crossonic.ipa ./Crossonic.ipa

      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain build.keychain
          rm ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

      - name: Upload .ipa file
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa-result
          path: Crossonic.ipa
          retention-days: 2
  build_web_zip:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        run: flutter pub get
      - name: Build generated files
        run: flutter pub run build_runner build
      - name: Compile for web
        run: flutter build web --wasm

      - name: Create .zip archive
        run: |
          cd build/web
          zip -r ../../crossonic.zip .

      - name: Upload .zip file
        uses: actions/upload-artifact@v7
        with:
          name: web-zip-result
          path: crossonic.zip
          retention-days: 2
  release:
    needs:
      - build
      - draft_release
      - build_android
      - build_linux_x86_64_TGZ
      - build_linux_x86_64_AppImage
      - build_windows_x86_64
      - build_macos_dmg
      - build_ios_ipa
      - build_web_zip
    runs-on: macos-latest
    steps:
      - name: Create uploads directory
        run: mkdir uploads

      # Android
      - name: Download Android files
        uses: actions/download-artifact@v8
        with:
          name: android-apk-result
          path: android-apk-result

      - name: Copy APKs to uploads
        run: |
          cp android-apk-result/app-armeabi-v7a-release.apk uploads/Crossonic-${{ needs.build.outputs.version }}-android-arm32v7.apk
          cp android-apk-result/app-arm64-v8a-release.apk uploads/Crossonic-${{ needs.build.outputs.version }}-android-arm64v8.apk
          cp android-apk-result/app-x86_64-release.apk uploads/Crossonic-${{ needs.build.outputs.version }}-android-x64.apk

      # TAR.GZ (x86_64)
      - name: Download tar.gz file
        uses: actions/download-artifact@v8
        with:
          name: tar-gz-x86-64-result
          path: tar-gz-x86-64-result

      - name: Copy tar.gz file to uploads
        run: |
          cp tar-gz-x86-64-result/* uploads/Crossonic-${{ needs.build.outputs.version }}-linux-x86-64.tar.gz

      # APPIMAGE (x86_64)
      - name: Download AppImage file
        uses: actions/download-artifact@v8
        with:
          name: appimage-x86-64-result
          path: appimage-x86-64-result

      - name: Download AppImage.zsync file
        uses: actions/download-artifact@v8
        with:
          name: appimage-zsync-x86-64-result
          path: appimage-zsync-x86-64-result

      - name: Copy AppImage files to uploads
        run: |
          cp appimage-x86-64-result/*.AppImage uploads/Crossonic-${{ needs.build.outputs.version }}-linux-x86-64.AppImage
          cp appimage-zsync-x86-64-result/*.AppImage.zsync uploads/Crossonic-${{ needs.build.outputs.version }}-linux-x86-64.AppImage.zsync

      # WINDOWS ZIP (x86_64)
      - name: Download windows zip file
        uses: actions/download-artifact@v8
        with:
          name: windows-zip-x86-64-result
          path: windows-zip-x86-64-result

      - name: Copy zip file to uploads
        run: cp windows-zip-x86-64-result/*.zip uploads/Crossonic-${{ needs.build.outputs.version }}-windows-x86-64.zip

      # WINDOWS Installer (x86_64)
      - name: Download windows installer file
        uses: actions/download-artifact@v8
        with:
          name: windows-installer-x86-64-result
          path: windows-installer-x86-64-result

      - name: Copy installer file to uploads
        run: cp windows-installer-x86-64-result/crossonic-installer.exe uploads/Crossonic-${{ needs.build.outputs.version }}-windows-x86-64.exe

      # macOS .dmg (universal)
      - name: Download macOS .dmg file
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg-result
          path: macos-dmg-result

      - name: Copy .dmg file to uploads
        run: cp macos-dmg-result/Crossonic.dmg uploads/Crossonic-${{ needs.build.outputs.version }}-macOS-universal.dmg

      # iOS .ipa
      - name: Download iOS .ipa file
        uses: actions/download-artifact@v8
        with:
          name: ios-ipa-result
          path: ios-ipa-result
      - name: Copy .ipa file to uploads
        run: cp ios-ipa-result/Crossonic.ipa uploads/Crossonic-${{ needs.build.outputs.version }}.ipa
      - name: Upload .ipa file to App Store Connect
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASS: ${{ secrets.APPLE_ID_PWD }}
        run: xcrun altool --upload-app -f uploads/Crossonic-${{ needs.build.outputs.version }}.ipa -t ios -u "$APPLE_ID" -p "$APPLE_APP_PASS"

      # web
      - name: Download web .zip file
        uses: actions/download-artifact@v8
        with:
          name: web-zip-result
          path: web-zip-result

      - name: Copy .zip file to uploads
        run: cp web-zip-result/crossonic.zip uploads/Crossonic-${{ needs.build.outputs.version }}-web.zip

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: v${{ needs.build.outputs.version }}
          preserve_order: true
          draft: true
          files: |
            uploads/Crossonic-${{ needs.build.outputs.version }}-android-arm64v8.apk
            uploads/Crossonic-${{ needs.build.outputs.version }}-android-arm32v7.apk
            uploads/Crossonic-${{ needs.build.outputs.version }}-android-x64.apk
            uploads/Crossonic-${{ needs.build.outputs.version }}-linux-x86-64.AppImage
            uploads/Crossonic-${{ needs.build.outputs.version }}-linux-x86-64.AppImage.zsync
            uploads/Crossonic-${{ needs.build.outputs.version }}-linux-x86-64.tar.gz
            uploads/Crossonic-${{ needs.build.outputs.version }}-windows-x86-64.exe
            uploads/Crossonic-${{ needs.build.outputs.version }}-windows-x86-64.zip
            uploads/Crossonic-${{ needs.build.outputs.version }}-macOS-universal.dmg
            uploads/Crossonic-${{ needs.build.outputs.version }}-web.zip
